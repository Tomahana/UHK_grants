<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hodnocení – UHK Connect</title>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Tato stránka je sdílená pro Connect i ReGa
    // Obsah se načítá dynamicky dle parametru ?c=
    const c = new URLSearchParams(window.location.search).get("c") || "uhk_connect_2026_v2";
    document.title = "Hodnocení – " + c;
  </script>
</head>
<body>
  <!-- Inline verze hodnocení Connect/ReGa -->
  <script>window.COMPETITION_ID = new URLSearchParams(window.location.search).get("c") || "uhk_connect_2026_v2";</script>
  <script>
    // Přesměruj na Návraty review s parametrem pro Connect
    // dokud nemáme samostatnou stránku
    document.addEventListener("DOMContentLoaded", () => {
      const user = Auth.requireLogin(["KOMISAR","PROREKTOR","ADMIN","TESTER"]);
      if (!user) return;
      // Zobraz dočasnou zprávu
      document.body.innerHTML = `
        <div style="font-family:'DM Sans',sans-serif;background:#F8F7F4;min-height:100vh;display:flex;align-items:center;justify-content:center;">
          <div style="background:white;border:1px solid #E2E0D8;border-radius:12px;padding:40px;max-width:500px;text-align:center;">
            <div style="font-size:36px;margin-bottom:16px;">⭐</div>
            <h2 style="font-size:20px;font-weight:500;color:#1C2E5A;margin-bottom:8px;">Hodnocení Connect / ReGa</h2>
            <p style="font-size:13px;color:#6B6A63;margin-bottom:24px;">Hodnoticí formulář pro tuto soutěž bude dostupný po spuštění kola hodnocení koordinátorkou.</p>
            <p style="font-size:12px;color:#6B6A63;margin-bottom:24px;">Soutěž: <strong style="color:#1C2E5A;">${window.COMPETITION_ID}</strong></p>
            <a href="coordinator.html" style="display:inline-block;background:#1C2E5A;color:white;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;margin-right:8px;">Správa přihlášek</a>
            <a href="dashboard.html" style="display:inline-block;background:white;color:#1C2E5A;border:1.5px solid #E2E0D8;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;">← Rozcestník</a>
          </div>
        </div>`;
    });
  </script>
</body>
</html>

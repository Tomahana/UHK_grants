<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="meta.dashboard">Rozcestník – UHK Grantové soutěže</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body class="app-page">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__logo">
        <img src="../img/uhk-abb-w.png" alt="UHK"
          style="height:28px;opacity:.9;">
        <span class="topbar__title" data-i18n="nav.grantsHub">Grantové soutěže</span>
      </div>
      <div class="topbar__right">
        <div class="topbar__user" id="topbarUser">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-info">
            <div class="user-name" id="userName">–</div>
            <div class="user-role" id="userRole">–</div>
          </div>
        </div>
        <button class="btn-logout" onclick="switchRole()" data-i18n-title="nav.switchRoleTitle" title="Přepnout roli" style="margin-right:4px;">
          <span data-i18n="nav.switchRole">⇄ Role</span>
        </button>
        <button class="btn-logout" onclick="Auth.logout()" data-i18n-title="nav.logoutTitle" title="Odhlásit se">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 14H3a1 1 0 01-1-1V3a1 1 0 011-1h3M11 11l3-3-3-3M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span data-i18n="nav.logout">Odhlásit</span>
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <div class="container">

      <!-- Uvítání -->
      <div class="dashboard-header">
        <div class="dashboard-header__text">
          <div class="dashboard-header__greeting" id="greeting">Dobré ráno</div>
          <h1 class="dashboard-header__name" id="welcomeName">–</h1>
          <p class="dashboard-header__sub" data-i18n="dashboard.pickCompetition">
            Vyberte soutěž, do které chcete vstoupit.
          </p>
        </div>
        <div class="dashboard-header__badge" id="roleBadge">–</div>
      </div>

      <!-- Zpráva o načítání / chybě -->
      <div id="dashboardMsg" class="alert alert--info" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 7v4M8 5h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span id="dashboardMsgText" data-i18n="dashboard.loading">Načítám soutěže…</span>
      </div>

      <!-- Karty soutěží -->
      <div class="competitions-grid" id="competitionsGrid">
        <!-- Renderováno JavaScriptem -->
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>

      <!-- Sekce pro admin: přehled systému -->
      <div id="adminSection" style="display:none;">
        <div class="section-divider">
          <span data-i18n="dashboard.adminSection">Administrace systému</span>
        </div>
        <div class="admin-tiles">
          <a href="admin-users.html" class="admin-tile">
            <div class="admin-tile__icon">👥</div>
            <div class="admin-tile__label" data-i18n="dashboard.adminUsers">Správa uživatelů</div>
            <div class="admin-tile__sub" data-i18n="dashboard.adminUsersSub">USERS · role · hesla</div>
          </a>
          <a href="admin-competitions.html" class="admin-tile">
            <div class="admin-tile__icon">⚙️</div>
            <div class="admin-tile__label" data-i18n="dashboard.adminComp">Nastavení soutěží</div>
            <div class="admin-tile__sub" data-i18n="dashboard.adminCompSub">CONFIG · termíny · alokace</div>
          </a>
          <a href="coordinator.html" class="admin-tile">
            <div class="admin-tile__icon">📋</div>
            <div class="admin-tile__label" data-i18n="dashboard.adminApps">Správa přihlášek</div>
            <div class="admin-tile__sub" data-i18n="dashboard.adminAppsSub">Přehled · stavy · mazání řádků</div>
          </a>
        </div>
      </div>

    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script>
    I18n.init();
    I18n.mountLangSwitch(document.querySelector(".topbar__right"), "first");
    const NAVRATY_CARD = FALLBACK_COMPETITIONS[0];

    // ── Ochrana stránky ────────────────────────────────────────
    const user = Auth.requireLogin(); // přesměruje na login.html pokud není session
    if (!user) {
      const g = document.getElementById("competitionsGrid");
      if (g) {
        g.innerHTML = `<div class="empty-state">
          <div class="empty-state__icon">🔐</div>
          <div class="empty-state__text">Nejste přihlášeni. Otevřete <a href="../login.html" style="color:var(--navy,#1C2E5A);font-weight:600;">přihlášení</a>.</div>
        </div>`;
      }
    } else {

    /** Nejvyšší role z účtu pro akce na kartách (správce s maskou „Žadatel“ vidí stále admin odkazy). */
    function effectiveDashboardRole() {
      const order = ["ADMIN", "TESTER", "PROREKTOR", "KOMISAR", "RESITEL", "READONLY", "ZADATEL"];
      for (const r of order) {
        if (Auth.hasAnyRole([r])) return r;
      }
      return user.role;
    }
    const dashRole = effectiveDashboardRole();
    const activeRole = String(user.role || "").toUpperCase();

    // ── Zobraz info o uživateli ────────────────────────────────
    document.getElementById("userName").textContent    = user.name || user.email;
    document.getElementById("userRole").textContent    = ROLES[user.role]?.label || user.role;
    document.getElementById("userAvatar").textContent  = (user.name || user.email)[0].toUpperCase();
    document.getElementById("roleBadge").textContent   = ROLES[user.role]?.label || user.role;
    document.getElementById("roleBadge").className     = `dashboard-header__badge role-badge--${String(user.role || "zadatel").toLowerCase()}`;

    // Uvítání: celé jméno z profilu, ne první „token“ (aby nezůstávalo jen „doc.“)
    const displayName = (user.name && String(user.name).trim()) ? String(user.name).trim() : "";
    const welcomeEl = document.getElementById("welcomeName");
    welcomeEl.textContent = displayName;
    welcomeEl.style.display = displayName ? "" : "none";

    const h = new Date().getHours();
    const baseGreet =
      h < 12 ? I18n.t("dashboard.greetMorning") : h < 18 ? I18n.t("dashboard.greetAfternoon") : I18n.t("dashboard.greetEvening");
    document.getElementById("greeting").textContent = displayName ? baseGreet + "," : baseGreet;

    // Admin sekce (stačí mít roli ADMIN/TESTER na účtu, i když je zvolená jiná maska)
    if (Auth.hasAnyRole(["ADMIN", "TESTER"])) {
      document.getElementById("adminSection").style.display = "block";
    }

    // ── Načti soutěže ──────────────────────────────────────────
    function getDashboardVisibility() {
      try { return JSON.parse(localStorage.getItem("uhk_dashboard_visibility") || "{}"); }
      catch { return {}; }
    }

    async function loadCompetitions() {
      // Skryté soutěže (dashboard_visible = FALSE) jen pro aktivní roli Správce/Tester.
      // Účet s více rolemi: při masce Komisař / Prorektor / … platí filtr jako u uživatele bez admin práv.
      const showHiddenCompetitions = ["ADMIN", "TESTER"].includes(String(user.role || "").toUpperCase());
      const vis = getDashboardVisibility();

      // Okamžitě zobraz fallback – žádné čekání na API
      let competitions = FALLBACK_COMPETITIONS.map(c => ({
        ...c,
        _visible: vis[c.id] !== undefined ? vis[c.id] : true,
      }));
      if (!showHiddenCompetitions) competitions = competitions.filter(c => c._visible);
      renderCompetitions(competitions, showHiddenCompetitions);
      enrichConnectFunding(competitions);

      // API aktualizace na pozadí – přidá reálné počty přihlášek
      try {
        let data = await Promise.race([
          API.getCompetitions(),
          new Promise((_,r) => setTimeout(() => r(new Error("timeout")), 4000)),
        ]);
        if (data && !Array.isArray(data) && Array.isArray(data.competitions)) data = data.competitions;
        if (Array.isArray(data) && data.length) {
          // Viditelnost z CONFIG (dashboard_visible v Sheets)
          let live = data
            .filter((c) => c && c.id != null && String(c.id).trim() !== "")
            .map((c) => ({
              ...c,
              _visible: c.dashboardVisible !== false,
            }));
          // Doplň Návraty pokud API nevrátí (musí mít _visible, jinak zmizí po filtru)
          if (!live.some(c => c.id === "uhk_navraty_2026")) {
            live.unshift({ ...NAVRATY_CARD, _visible: true });
          }
          if (!showHiddenCompetitions) live = live.filter(c => c._visible);
          renderCompetitions(live, showHiddenCompetitions);
          enrichConnectFunding(live);
        }
      } catch(e) {
        // Fallback už je zobrazen – nic nedělej
        console.info("API timeout/chyba, zobrazuji fallback:", e.message);
      }
    }

    async function enrichConnectFunding(list) {
      const can = ["ADMIN", "PROREKTOR", "KOMISAR", "KOMISAŘ"].includes(activeRole);
      if (!can || !list || !list.length) return;
      const sess = Auth._getSession();
      if (!sess || !sess.token) return;
      for (const comp of list) {
        if (!comp || comp.id == null || String(comp.id).trim() === "") continue;
        const card = document.querySelector(".comp-card[data-comp-id=\"" + String(comp.id).replace(/\\/g, "\\\\").replace(/"/g, '\\"') + "\"]");
        const slot = card && card.querySelector(".connect-funding-slot");
        if (!slot) continue;
        try {
          const data = await API.getConnectFundingSummary(comp.id);
          if (!data || data.error || !data.supported) {
            slot.innerHTML = "";
            slot.style.display = "none";
            continue;
          }
          slot.style.display = "block";
          const allocShow = Number(data.allocationCzk) || Number(comp.allocation) || 0;
          const assignedShow = Number(data.assignedCzk) || 0;
          const acceptedShow = Number(data.acceptedCzk) || 0;
          const remainingShow = Math.max(0, allocShow - assignedShow);
          const foot =
            data.detailLevel === "connect"
              ? I18n.t("dashboard.budgetFootConnect")
              : I18n.t("dashboard.budgetFootOther");
          const submittedCount = Number(data.submittedCount) || Number(comp.applicationsCount) || 0;
          const supportedCount = Number(data.supportedCount) || 0;
          slot.innerHTML = `
            <div style="font-weight:600;color:#1C2E5A;margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;">${I18n.t("dashboard.budgetTitle")}</div>
            <div style="display:grid;gap:4px;">
              <div>${I18n.t("dashboard.budgetAllocated")} <strong>${formatCZK(allocShow)}</strong></div>
              <div>${I18n.t("dashboard.budgetAssigned")} <strong>${formatCZK(assignedShow)}</strong></div>
              <div>${I18n.t("dashboard.budgetUsed")} <strong>${formatCZK(acceptedShow)}</strong></div>
              <div>${I18n.t("dashboard.budgetRemaining")} <strong>${formatCZK(remainingShow)}</strong></div>
              <div>${I18n.t("dashboard.metaApplications")} <strong>${submittedCount}</strong></div>
              <div>${I18n.t("dashboard.budgetSupportedProjects")} <strong>${supportedCount}</strong></div>
            </div>
            <div style="font-size:10px;opacity:.75;margin-top:6px;line-height:1.4;">${foot}</div>`;
        } catch (e) {
          slot.innerHTML = "<span style=\"opacity:.65\">" + I18n.t("dashboard.budgetLoadErr") + "</span>";
          slot.style.display = "block";
        }
      }
    }

    function renderCompetitions(list, showHiddenCompetitions) {
      const grid = document.getElementById("competitionsGrid");
      grid.innerHTML = "";

      if (!list.length) {
        grid.innerHTML = `<div class="empty-state">
          <div class="empty-state__icon">📭</div>
          <div class="empty-state__text">${I18n.t("dashboard.emptyCompetitions")}</div>
        </div>`;
        return;
      }

      list.forEach((comp, i) => {
        const card = buildCompetitionCard(comp, dashRole);
        card.style.animationDelay = (i * 0.08) + "s";
        // Šedý štítek „Skryto“ jen ve správcovské / testerské masce
        if (showHiddenCompetitions && comp._visible === false) {
          const badge = document.createElement("div");
          badge.style.cssText = "position:absolute;top:10px;right:10px;background:#6B7280;color:white;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;letter-spacing:.05em;";
          badge.textContent = I18n.t("dashboard.hidden");
          card.style.position = "relative";
          card.style.opacity = "0.65";
          card.appendChild(badge);
        }
        grid.appendChild(card);
      });
    }

    function buildCompetitionCard(comp, role) {
      const card = document.createElement("div");
      const compId = comp && comp.id != null ? String(comp.id).trim() : "";
      const statusKey = String(comp.status != null ? comp.status : "DRAFT").trim() || "DRAFT";
      const statusLc = statusKey.toLowerCase();
      card.className = `comp-card comp-card--${statusLc} fade-in`;
      if (compId) card.dataset.compId = compId;

      const statusUp = statusKey.toUpperCase();
      const statusInfo = COMP_STATUSES[statusKey] || COMP_STATUSES[statusUp] || { label: statusKey, icon: "●" };
      const actions    = getActionsForRole(role, comp);
      const showFundingSlot = ["ADMIN", "PROREKTOR", "KOMISAR", "KOMISAŘ"].includes(activeRole);

      card.innerHTML = `
        <div class="comp-card__header">
          <div class="comp-card__status-dot status-dot--${statusLc}"></div>
          <span class="comp-card__status-label">${statusInfo.icon} ${statusInfo.label}</span>
        </div>
        <div class="comp-card__body">
          <div class="comp-card__type">${I18n.dashboardCompetitionTypeLabel(comp.type)}</div>
          <h2 class="comp-card__name">${I18n.dashboardCompetitionName(comp)}</h2>
          <p class="comp-card__desc">${I18n.dashboardCompetitionDesc(comp)}</p>

          <div class="comp-card__meta">
            ${comp.deadline ? `
              <div class="meta-item">
                <span class="meta-label">${I18n.t("dashboard.metaDeadline")}</span>
                <span class="meta-val ${isNear(comp.deadline) ? "meta-val--warn" : ""}">
                  ${formatDate(comp.deadline)}
                </span>
              </div>` : ""}
            ${comp.allocation ? `
              <div class="meta-item">
                <span class="meta-label">${I18n.t("dashboard.metaAllocation")}</span>
                <span class="meta-val">${formatCZK(comp.allocation)}</span>
              </div>` : ""}
            ${comp.applicationsCount !== undefined ? `
              <div class="meta-item">
                <span class="meta-label">${I18n.t("dashboard.metaApplications")}</span>
                <span class="meta-val">${comp.applicationsCount}</span>
              </div>` : ""}
          </div>
          ${showFundingSlot ? `
          <div class="connect-funding-slot" style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(28,46,90,.1);font-size:12px;color:#6B6A63;line-height:1.5;">
            <span style="opacity:.65">${I18n.t("dashboard.fundingLoading")}</span>
          </div>` : ""}
        </div>
        <div class="comp-card__actions">
          ${actions.map(a => `
            <a href="${a.href}" class="comp-action comp-action--${a.style}">
              ${a.icon} ${a.label}
            </a>`).join("")}
        </div>`;

      return card;
    }

    /** Nové podání přihlášky jen ve stavu OPEN (RUNNING / CLOSED / DRAFT = uzavřeno pro žadatele). */
    function competitionAllowsApplications(comp) {
      const st = String(comp.status || "").toUpperCase().trim();
      return st === "OPEN";
    }

    // Akce dle role a stavu soutěže
    function getActionsForRole(role, comp) {
      const id     = comp.id;
      const isOpen = competitionAllowsApplications(comp);
      const type   = comp.type;

      // Odkaz na hodnoticí formulář
      const reviewHref = type === "OP_JAK_NAVRATY"
        ? "review-navraty.html"
        : `review-connect.html?c=${id}`;

      // Odkaz na podání přihlášky dle soutěže
      const applyHref =
        type === "UHK_CONNECT"    ? `apply-connect.html?c=${id}` :
        type === "UHK_REGA"       ? `apply-rega.html` :
        type === "UHK_PRESTIGE"   ? `apply-prestige.html` :
        null; // Návraty nemají přihlášku přes web

      // Connect: přehled na my-connect; u uzavřené ReGa/Prestige nevést na formulář, ale na přehled projektů
      const myApplicationsHref =
        type === "UHK_CONNECT"
          ? `my-connect.html?c=${id}`
          : (type === "UHK_REGA" || type === "UHK_PRESTIGE") && !isOpen
            ? "my-projects.html"
            : applyHref;
      const myListLabel = type === "UHK_CONNECT" ? I18n.t("dashboard.actionMyProjects") : I18n.t("dashboard.actionMyApps");

      const actionMap = {
        ADMIN: type === "OP_JAK_NAVRATY" ? [
          { label: I18n.t("dashboard.actionReviewCommission"), href: reviewHref,               style: "primary",   icon: "⭐" },
          { label: I18n.t("dashboard.actionManageUsers"), href: "admin-users.html",       style: "ghost",     icon: "👥" },
          { label: I18n.t("dashboard.actionSettings"),        href: "admin-competitions.html", style: "ghost",     icon: "⚙️" },
        ] : [
          ...(isOpen && applyHref
            ? [{ label: I18n.t("dashboard.actionSubmit"), href: applyHref, style: "primary", icon: "📝" }]
            : []),
          { label: I18n.t("dashboard.actionManageApps"),href: "coordinator.html",         style: "secondary", icon: "📋" },
          { label: I18n.t("dashboard.actionReview"),       href: reviewHref,                 style: "ghost",     icon: "⭐" },
          { label: I18n.t("dashboard.actionSettings"),       href: "admin-competitions.html",  style: "ghost",     icon: "⚙️" },
        ],

        PROREKTOR: [
          { label: I18n.t("dashboard.actionApprove"),  href: reviewHref,                    style: "primary",   icon: "✅" },
        ],

        KOMISAR: type === "OP_JAK_NAVRATY" ? [
          { label: I18n.t("dashboard.actionRate"),     href: reviewHref,                    style: "primary",   icon: "⭐" },
          { label: I18n.t("dashboard.actionOverview"),      href: reviewHref,                    style: "ghost",     icon: "📊" },
        ] : [
          { label: I18n.t("dashboard.actionRate"),     href: reviewHref,                    style: "primary",   icon: "⭐" },
        ],

        TESTER: [
          ...(isOpen && applyHref
            ? [{ label: I18n.t("dashboard.actionSubmit"), href: applyHref, style: "primary", icon: "📝" }]
            : []),
          { label: I18n.t("dashboard.actionManageApps"),href: "coordinator.html",         style: "secondary", icon: "📋" },
          { label: I18n.t("dashboard.actionReview"),       href: reviewHref,                 style: "ghost",     icon: "⭐" },
          { label: I18n.t("dashboard.actionSettings"),       href: "admin-competitions.html",  style: "ghost",     icon: "⚙️" },
        ],

        ZADATEL: applyHref ? (isOpen ? [
          { label: I18n.t("dashboard.actionSubmit"), href: applyHref,                  style: "primary",   icon: "📝" },
          { label: myListLabel,  href: myApplicationsHref,          style: "ghost",     icon: "📁" },
        ] : [
          { label: myListLabel,  href: myApplicationsHref,          style: "ghost",     icon: "📁" },
        ]) : [
          { label: I18n.t("dashboard.actionNoApply"), href: "#",            style: "ghost",     icon: "📋" },
        ],

        RESITEL: applyHref ? [
          { label: myListLabel,  href: myApplicationsHref,         style: "primary",   icon: "📁" },
          { label: I18n.t("dashboard.actionReports"),          href: "my-projects.html",         style: "ghost",     icon: "📄" },
        ] : [
          { label: I18n.t("dashboard.actionMyProjects"),   href: "my-projects.html",         style: "primary",   icon: "📁" },
        ],

        READONLY: [
          { label: I18n.t("dashboard.actionOverview"),      href: reviewHref,                    style: "ghost",     icon: "👁" },
        ],
      };

      return actionMap[role] || (applyHref ? (isOpen ? [
        { label: I18n.t("dashboard.actionEnter"), href: applyHref, style: "primary", icon: "→" },
      ] : [
        { label: myListLabel, href: myApplicationsHref, style: "ghost", icon: "📁" },
      ]) : [
        { label: I18n.t("dashboard.actionReview"), href: reviewHref, style: "ghost", icon: "→" },
      ]);
    }

    // ── Utility ────────────────────────────────────────────────
    function isNear(dateStr, days = 14) {
      const diff = (new Date(dateStr) - new Date()) / 86400000;
      return diff >= 0 && diff <= days;
    }

    // ── Spusť ──────────────────────────────────────────────────
    loadCompetitions();

    }

    // ── Přepnutí role (globální – onclick v HTML) ───────────────
    function switchRole() {
      const session = Auth._getSession();
      if (!session) {
        window.location.href = "../login.html";
        return;
      }
      let allRoles = session.allRoles || [session.role];

      document.getElementById("modalUserEmail").textContent = session.email;

      const ROLE_COLORS = {
        ADMIN: "#1C2E5A", PROREKTOR: "#5B21B6", KOMISAR: "#1E6B45", TESTER: "#B45309",
        ZADATEL: "#1D4ED8", RESITEL: "#0369A1", READONLY: "#6B7280",
      };
      const ROLE_BG = {
        ADMIN: "#E8EDF8", PROREKTOR: "#EDE9FE", KOMISAR: "#E6F4EE", TESTER: "#FEF3C7",
        ZADATEL: "#DBEAFE", RESITEL: "#E0F2FE", READONLY: "#F3F4F6",
      };

      const opts = document.getElementById("roleOptions");
      opts.innerHTML = allRoles.map(role => {
        const meta = I18n.roleLoginMeta(role);
        const color = ROLE_COLORS[role] || "#6B7280";
        const bg = ROLE_BG[role] || "#F3F4F6";
        const m = { name: meta.name, color, bg };
        const isActive = role === session.role;
        return `
          <button onclick="selectNewRole('${role}')" style="
            display:flex;align-items:center;gap:12px;
            padding:12px 16px;border-radius:8px;cursor:pointer;
            background:${isActive ? m.bg : 'var(--grey-100)'};
            border:1.5px solid ${isActive ? m.color : 'var(--grey-300)'};
            font-family:var(--font-body);width:100%;text-align:left;
            transition:all .15s;
          ">
            <div style="width:10px;height:10px;border-radius:50%;background:${m.color};flex-shrink:0;"></div>
            <div>
              <div style="font-size:14px;font-weight:600;color:${m.color};">${m.name}</div>
              ${isActive ? '<div style="font-size:11px;color:var(--grey-500);">' + I18n.t("dashboard.roleCurrent") + "</div>" : ""}
            </div>
          </button>`;
      }).join("");

      document.getElementById("roleModal").style.display = "flex";
    }

    function selectNewRole(role) {
      const session = Auth._getSession();
      if (!session) return;
      if (!Auth.setSession(session.token, session.email, session.name, role, session.allRoles)) {
        alert(typeof I18n !== "undefined" && I18n.t ? I18n.t("login.errSessionStorage") : "Nelze uložit relaci v prohlížeči.");
        return;
      }
      closeRoleModal();
      window.location.reload();
    }

    function closeRoleModal() {
      document.getElementById("roleModal").style.display = "none";
    }

    document.getElementById("roleModal")?.addEventListener("click", e => {
      if (e.target === document.getElementById("roleModal")) closeRoleModal();
    });
  </script>

  <!-- Modal: přepnutí role -->
  <div id="roleModal" style="display:none;position:fixed;inset:0;background:rgba(26,46,90,.5);
    backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;">
    <div style="background:var(--white);border-radius:var(--radius-lg);padding:32px;
      max-width:400px;width:90%;box-shadow:var(--shadow-lg);">
      <h3 style="font-family:var(--font-head);font-size:20px;color:var(--navy);margin-bottom:8px;" data-i18n="dashboard.modalTitle">
        Přepnout roli
      </h3>
      <p style="font-size:13px;color:var(--grey-500);margin-bottom:20px;">
        <span data-i18n="dashboard.modalSub">Přihlášen jako:</span> <strong id="modalUserEmail">—</strong>
      </p>
      <div id="roleOptions" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;"></div>
      <button class="btn btn--outline" onclick="closeRoleModal()" style="width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--grey-300);background:transparent;cursor:pointer;font-family:var(--font-body);font-size:14px;" data-i18n="dashboard.modalCancel">
        Zrušit
      </button>
    </div>
  </div>
</body>
</html>

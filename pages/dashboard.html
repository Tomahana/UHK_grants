<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rozcestník – UHK Grantové soutěže</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body class="app-page">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__logo">
        <img src="../img/uhk-abb-w.png" alt="UHK"
          style="height:28px;opacity:.9;">
        <span class="topbar__title">Grantové soutěže</span>
      </div>
      <div class="topbar__right">
        <div class="topbar__user" id="topbarUser">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-info">
            <div class="user-name" id="userName">–</div>
            <div class="user-role" id="userRole">–</div>
          </div>
        </div>
        <button class="btn-logout" onclick="switchRole()" title="Přepnout roli" style="margin-right:4px;">
          ⇄ Role
        </button>
        <button class="btn-logout" onclick="Auth.logout()" title="Odhlásit se">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 14H3a1 1 0 01-1-1V3a1 1 0 011-1h3M11 11l3-3-3-3M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Odhlásit
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">
    <div class="container">

      <!-- Uvítání -->
      <div class="dashboard-header">
        <div class="dashboard-header__text">
          <div class="dashboard-header__greeting" id="greeting">Dobré ráno</div>
          <h1 class="dashboard-header__name" id="welcomeName">–</h1>
          <p class="dashboard-header__sub">
            Vyberte soutěž, do které chcete vstoupit.
          </p>
        </div>
        <div class="dashboard-header__badge" id="roleBadge">–</div>
      </div>

      <!-- Zpráva o načítání / chybě -->
      <div id="dashboardMsg" class="alert alert--info" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 7v4M8 5h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span id="dashboardMsgText">Načítám soutěže…</span>
      </div>

      <!-- Karty soutěží -->
      <div class="competitions-grid" id="competitionsGrid">
        <!-- Renderováno JavaScriptem -->
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>

      <!-- Sekce pro admin: přehled systému -->
      <div id="adminSection" style="display:none;">
        <div class="section-divider">
          <span>Administrace systému</span>
        </div>
        <div class="admin-tiles">
          <a href="admin-users.html" class="admin-tile">
            <div class="admin-tile__icon">👥</div>
            <div class="admin-tile__label">Správa uživatelů</div>
            <div class="admin-tile__sub">USERS · role · hesla</div>
          </a>
          <a href="admin-competitions.html" class="admin-tile">
            <div class="admin-tile__icon">⚙️</div>
            <div class="admin-tile__label">Nastavení soutěží</div>
            <div class="admin-tile__sub">CONFIG · termíny · alokace</div>
          </a>
          <a href="coordinator.html" class="admin-tile">
            <div class="admin-tile__icon">📋</div>
            <div class="admin-tile__label">Správa přihlášek</div>
            <div class="admin-tile__sub">Kontrola · změna stavů</div>
          </a>
        </div>
      </div>

    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script>
    // ── Ochrana stránky ────────────────────────────────────────
    const user = Auth.requireLogin(); // přesměruje na login.html pokud není session

    // ── Zobraz info o uživateli ────────────────────────────────
    document.getElementById("userName").textContent    = user.name || user.email;
    document.getElementById("userRole").textContent    = ROLES[user.role]?.label || user.role;
    document.getElementById("userAvatar").textContent  = (user.name || user.email)[0].toUpperCase();
    document.getElementById("welcomeName").textContent = user.name?.split(" ")[0] || user.email;
    document.getElementById("roleBadge").textContent   = ROLES[user.role]?.label || user.role;
    document.getElementById("roleBadge").className     = `dashboard-header__badge role-badge--${user.role.toLowerCase()}`;

    // Pozdrav podle hodiny
    const h = new Date().getHours();
    document.getElementById("greeting").textContent =
      h < 12 ? "Dobré ráno," : h < 18 ? "Dobré odpoledne," : "Dobrý večer,";

    // Admin sekce
    if (["ADMIN", "TESTER"].includes(user.role)) {
      document.getElementById("adminSection").style.display = "block";
    }

    // ── Načti soutěže ──────────────────────────────────────────
    async function loadCompetitions() {
      let competitions = [];
      try {
        const data = await API.getCompetitions();
        competitions = Array.isArray(data) ? data : [];
      } catch (err) {
        // API chyba – použij Connect demo kartu
        competitions = [DEMO_COMPETITIONS[0]];
      }

      // Vždy přidej Návraty pokud tam nejsou
      const hasNavraty = competitions.some(c => c.id === "uhk_navraty_2026");
      if (!hasNavraty) competitions.push(NAVRATY_CARD);

      renderCompetitions(competitions);
    }

    function renderCompetitions(list) {
      const grid = document.getElementById("competitionsGrid");
      grid.innerHTML = "";

      if (!list.length) {
        grid.innerHTML = `<div class="empty-state">
          <div class="empty-state__icon">📭</div>
          <div class="empty-state__text">Žádné aktivní soutěže</div>
        </div>`;
        return;
      }

      list.forEach((comp, i) => {
        const card = buildCompetitionCard(comp, user.role);
        card.style.animationDelay = (i * 0.08) + "s";
        grid.appendChild(card);
      });
    }

    function buildCompetitionCard(comp, role) {
      const card = document.createElement("div");
      card.className = `comp-card comp-card--${comp.status.toLowerCase()} fade-in`;

      const statusInfo = COMP_STATUSES[comp.status] || { label: comp.status, icon: "●" };
      const actions    = getActionsForRole(role, comp);

      card.innerHTML = `
        <div class="comp-card__header">
          <div class="comp-card__status-dot status-dot--${comp.status.toLowerCase()}"></div>
          <span class="comp-card__status-label">${statusInfo.icon} ${statusInfo.label}</span>
        </div>
        <div class="comp-card__body">
          <div class="comp-card__type">${
            comp.type === "UHK_CONNECT" ? "UHK Connect" :
            comp.type === "UHK_REGA"    ? "UHK ReGa" :
            comp.type === "OP_JAK_NAVRATY" ? "OP JAK Návraty" :
            comp.type === "UHK_PRESTIGE"    ? "UHK Prestige" :
            comp.type
          }</div>
          <h2 class="comp-card__name">${comp.name}</h2>
          <p class="comp-card__desc">${comp.description || ""}</p>

          <div class="comp-card__meta">
            ${comp.deadline ? `
              <div class="meta-item">
                <span class="meta-label">Uzávěrka</span>
                <span class="meta-val ${isNear(comp.deadline) ? "meta-val--warn" : ""}">
                  ${formatDate(comp.deadline)}
                </span>
              </div>` : ""}
            ${comp.allocation ? `
              <div class="meta-item">
                <span class="meta-label">Alokace</span>
                <span class="meta-val">${formatCZK(comp.allocation)}</span>
              </div>` : ""}
            ${comp.applicationsCount !== undefined ? `
              <div class="meta-item">
                <span class="meta-label">Přihlášky</span>
                <span class="meta-val">${comp.applicationsCount}</span>
              </div>` : ""}
          </div>
        </div>
        <div class="comp-card__actions">
          ${actions.map(a => `
            <a href="${a.href}" class="comp-action comp-action--${a.style}">
              ${a.icon} ${a.label}
            </a>`).join("")}
        </div>`;

      return card;
    }

    // Akce dle role a stavu soutěže
    function getActionsForRole(role, comp) {
      const id     = comp.id;
      const isOpen = comp.status === "OPEN";
      const type   = comp.type;

      // Odkaz na hodnoticí formulář
      const reviewHref = type === "OP_JAK_NAVRATY"
        ? "review-navraty.html"
        : "review-navraty.html";   // TODO: obecný review.html pro Connect/ReGa/Prestige

      // Odkaz na podání přihlášky dle soutěže
      const applyHref =
        type === "UHK_CONNECT"    ? `apply-connect.html` :
        type === "UHK_REGA"       ? `apply-rega.html` :
        type === "UHK_PRESTIGE"   ? `apply-prestige.html` :
        null; // Návraty nemají přihlášku přes web

      // Přihlášky (pouze ne-Návraty soutěže)
      const applyActions = applyHref && isOpen ? [
        { label: "Podat přihlášku", href: applyHref, style: "primary", icon: "📝" },
      ] : applyHref ? [
        { label: "Moje přihlášky",  href: applyHref, style: "ghost",   icon: "📁" },
      ] : [];

      const actionMap = {
        ADMIN: type === "OP_JAK_NAVRATY" ? [
          { label: "Hodnocení komise", href: reviewHref,               style: "primary",   icon: "⭐" },
          { label: "Správa uživatelů", href: "admin-users.html",       style: "ghost",     icon: "👥" },
          { label: "Nastavení",        href: "admin-competitions.html", style: "ghost",     icon: "⚙️" },
        ] : [
          ...applyActions,
          { label: "Přihlášky",    href: applyHref || "#",             style: "secondary", icon: "📋" },
          { label: "Hodnocení",    href: reviewHref,                    style: "ghost",     icon: "⭐" },
          { label: "Nastavení",    href: "admin-competitions.html",     style: "ghost",     icon: "⚙️" },
        ],

        PROREKTOR: [
          { label: "Schvalování",  href: reviewHref,                    style: "primary",   icon: "✅" },
        ],

        KOMISAR: type === "OP_JAK_NAVRATY" ? [
          { label: "Hodnotit",     href: reviewHref,                    style: "primary",   icon: "⭐" },
          { label: "Přehled",      href: reviewHref,                    style: "ghost",     icon: "📊" },
        ] : [
          { label: "Hodnotit",     href: reviewHref,                    style: "primary",   icon: "⭐" },
        ],

        TESTER: [
          ...applyActions,
          { label: "Hodnocení",    href: reviewHref,                    style: "secondary", icon: "⭐" },
          { label: "Nastavení",    href: "admin-competitions.html",     style: "ghost",     icon: "⚙️" },
          { label: "Správa už.",   href: "admin-users.html",            style: "ghost",     icon: "👥" },
        ],

        ZADATEL: applyHref ? (isOpen ? [
          { label: "Podat přihlášku", href: applyHref,                  style: "primary",   icon: "📝" },
          { label: "Moje přihlášky",  href: applyHref,                  style: "ghost",     icon: "📁" },
        ] : [
          { label: "Moje přihlášky",  href: applyHref,                  style: "ghost",     icon: "📁" },
        ]) : [
          { label: "Soutěž nepřijímá přihlášky", href: "#",            style: "ghost",     icon: "📋" },
        ],

        RESITEL: applyHref ? [
          { label: "Moje přihlášky",  href: applyHref,                  style: "primary",   icon: "📁" },
          { label: "Zprávy",          href: "my-projects.html",         style: "ghost",     icon: "📄" },
        ] : [
          { label: "Moje projekty",   href: "my-projects.html",         style: "primary",   icon: "📁" },
        ],

        READONLY: [
          { label: "Přehled",      href: reviewHref,                    style: "ghost",     icon: "👁" },
        ],
      };

      return actionMap[role] || (applyHref ? [
        { label: "Vstoupit",  href: applyHref,  style: "primary", icon: "→" },
      ] : [
        { label: "Hodnocení", href: reviewHref, style: "ghost",   icon: "→" },
      ]);
    }

    // ── Utility ────────────────────────────────────────────────
    function formatDate(str) {
      if (!str) return "–";
      return new Date(str).toLocaleDateString("cs-CZ", {
        day: "numeric", month: "long", year: "numeric"
      });
    }
    function formatCZK(n) {
      return Number(n).toLocaleString("cs-CZ") + " Kč";
    }
    function isNear(dateStr, days = 14) {
      const diff = (new Date(dateStr) - new Date()) / 86400000;
      return diff >= 0 && diff <= days;
    }

    // ── Karta Návraty – vždy zobrazit ─────────────────────────
    const NAVRATY_CARD = {
      id:          "uhk_navraty_2026",
      name:        "OP JAK Návraty – IGA komise",
      type:        "OP_JAK_NAVRATY",
      status:      "RUNNING",
      description: "Hodnocení projektů v rámci UHK: Return – Research – Restart. Reg. č. CZ.02.01.01/00/24_037/0013855.",
      deadline:    "2026-06-30",
      allocation:  40156893,
      applicationsCount: 7,
    };

    // ── Demo data (fallback když API nedostupné) ───────────────
    const DEMO_COMPETITIONS = [
      {
        id:          "uhk_connect_2026_v2",
        name:        "UHK Connect – výzva č. 2",
        type:        "UHK_CONNECT",
        status:      "OPEN",
        description: "Krátké projekty pro síťování, mobilitu a navázání spolupráce.",
        deadline:    "2026-10-14",
        allocation:  800000,
        applicationsCount: 12,
      },
      {
        id:          "uhk_rega_2026_v1",
        name:        "UHK ReGa – výzva č. 1",
        type:        "UHK_REGA",
        status:      "OPEN",
        description: "Podpora dopracování a znovupodání nezafinancovaných projektů základního výzkumu.",
        deadline:    "2026-04-01",
        allocation:  2000000,
        applicationsCount: 0,
      },
      {
        id:          "uhk_prestige_2026",
        name:        "UHK Prestige 2026",
        type:        "UHK_PRESTIGE",
        status:      "OPEN",
        description: "Prestižní granty Univerzity Hradec Králové.",
        deadline:    "",
        allocation:  0,
        applicationsCount: 0,
      },
      NAVRATY_CARD,
    ];


    // ── Přepnutí role ──────────────────────────────────────────
    function switchRole() {
      const session = Auth._getSession();
      if (!session) return;
      // Čti allRoles přímo ze session (uloženo při přihlášení)
      let allRoles = session.allRoles || [session.role];

      document.getElementById("modalUserEmail").textContent = session.email;

      const ROLE_META = {
        ADMIN:     { name:"Správce",     color:"#1C2E5A", bg:"#E8EDF8" },
        PROREKTOR: { name:"Prorektor",   color:"#5B21B6", bg:"#EDE9FE" },
        KOMISAR:   { name:"Člen komise", color:"#1E6B45", bg:"#E6F4EE" },
        TESTER:    { name:"Tester",      color:"#B45309", bg:"#FEF3C7" },
        ZADATEL:   { name:"Žadatel",     color:"#1D4ED8", bg:"#DBEAFE" },
        RESITEL:   { name:"Řešitel",     color:"#0369A1", bg:"#E0F2FE" },
        READONLY:  { name:"Jen čtení",   color:"#6B7280", bg:"#F3F4F6" },
      };

      const opts = document.getElementById("roleOptions");
      opts.innerHTML = allRoles.map(role => {
        const m = ROLE_META[role] || { name: role, color:"#6B7280", bg:"#F3F4F6" };
        const isActive = role === session.role;
        return `
          <button onclick="selectNewRole('${role}')" style="
            display:flex;align-items:center;gap:12px;
            padding:12px 16px;border-radius:8px;cursor:pointer;
            background:${isActive ? m.bg : 'var(--grey-100)'};
            border:1.5px solid ${isActive ? m.color : 'var(--grey-300)'};
            font-family:var(--font-body);width:100%;text-align:left;
            transition:all .15s;
          ">
            <div style="width:10px;height:10px;border-radius:50%;background:${m.color};flex-shrink:0;"></div>
            <div>
              <div style="font-size:14px;font-weight:600;color:${m.color};">${m.name}</div>
              ${isActive ? '<div style="font-size:11px;color:var(--grey-500);">Aktuální role</div>' : ''}
            </div>
          </button>`;
      }).join("");

      document.getElementById("roleModal").style.display = "flex";
    }

    function selectNewRole(role) {
      const session = Auth._getSession();
      Auth.setSession(session.token, session.email, session.name, role);
      closeRoleModal();
      // Obnov stránku s novou rolí
      window.location.reload();
    }

    function closeRoleModal() {
      document.getElementById("roleModal").style.display = "none";
    }

    // Zavření modalu kliknutím mimo
    document.getElementById("roleModal")?.addEventListener("click", e => {
      if (e.target === document.getElementById("roleModal")) closeRoleModal();
    });
    // ── Spusť ──────────────────────────────────────────────────
    loadCompetitions();
  </script>

  <!-- Modal: přepnutí role -->
  <div id="roleModal" style="display:none;position:fixed;inset:0;background:rgba(26,46,90,.5);
    backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;">
    <div style="background:var(--white);border-radius:var(--radius-lg);padding:32px;
      max-width:400px;width:90%;box-shadow:var(--shadow-lg);">
      <h3 style="font-family:var(--font-head);font-size:20px;color:var(--navy);margin-bottom:8px;">
        Přepnout roli
      </h3>
      <p style="font-size:13px;color:var(--grey-500);margin-bottom:20px;">
        Přihlášen jako: <strong id="modalUserEmail">—</strong>
      </p>
      <div id="roleOptions" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;"></div>
      <button class="btn btn--outline" onclick="closeRoleModal()" style="width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--grey-300);background:transparent;cursor:pointer;font-family:var(--font-body);font-size:14px;">
        Zrušit
      </button>
    </div>
  </div>
</body>
</html>
